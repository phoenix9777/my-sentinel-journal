
    <!DOCTYPE html>
    <html lang="de">
    <head>
        <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <body>
        <div class="container">
            <a href="index.html">← Zurück zum Dashboard</a>
            <h1>👑 KING VOLKAN TERMINAL | BTC/USD</h1>
            
            <div class="tf-stats">
                <div class="stat-card"><strong>1H</strong><br>Bullish (Short-Term) 🟢<br>RSI: 66.5</div>

                    "timezone": "Europe/Berlin", "theme": "dark", "style": "1",
                    "locale": "de", "container_id": "tv-chart"

            function changeChart(tf) { renderChart(tf); }
