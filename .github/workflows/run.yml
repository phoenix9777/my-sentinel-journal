name: 4H Journal Autopilot
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install requests pandas pandas-ta  # WICHTIG: Neue Tools hinzugefügt
      - name: Journal senden
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python journal.py
