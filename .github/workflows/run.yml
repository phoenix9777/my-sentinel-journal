Name: 4H Journal Autopilot

on:
  schedule:
    - cron: "0 */4 * * *" # Läuft alle 4 Stunden
  workflow_dispatch:      # Manuelles Starten möglich

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Holt die gesamte Historie für sauberes Committen

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install requests pandas pandas-ta discord.py
        
      - name: Journal & HTML Report erstellen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CRYPTOCOMPARE_KEY: ${{ secrets.CRYPTOCOMPARE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python journal.py 

      # Speichert die last_prices.json & index.html, damit alles aktuell bleibt
      - name: Save Data & History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_prices.json index.html *.html || echo "Keine neuen Daten"
          git commit -m "Update Journal & Prices [skip ci]" || echo "Nichts zu committen"
          git push origin main || echo "Push auf Main fehlgeschlagen"

      - name: Deploy Web Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages 
