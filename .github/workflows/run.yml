name: 4H Journal Autopilot

on:
  schedule:
    # Das bedeutet: Alle 4 Stunden ausführen
    - cron: "0 */4 * * *"
  workflow_dispatch: # Erlaubt es dir, den Bot auch manuell zu testen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code laden
        uses: actions/checkout@v3

      - name: Python installieren
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: requests installieren
        run: pip install requests

      - name: Journal senden
        run: python journal.py
